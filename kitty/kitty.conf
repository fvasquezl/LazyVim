# =============================================================================
# Fuente
# =============================================================================
font_family      FiraCode Nerd Font
bold_font        FiraCode Nerd Font Bold
italic_font      FiraCode Nerd Font
bold_italic_font FiraCode Nerd Font Bold
font_size        14.0

# Ligaduras activadas
disable_ligatures never

# =============================================================================
# Transparencia
# =============================================================================
background_opacity 0.85
dynamic_background_opacity yes

# =============================================================================
# Tema: Solarized Osaka (craftzdog/solarized-osaka.nvim)
# https://github.com/craftzdog/solarized-osaka.nvim
# =============================================================================
foreground #9facae
background #00141a

selection_foreground #00141a
selection_background #268bd2

cursor           #268bd2
cursor_text_color #00141a

url_color #2aa198

# Colores normales (Solarized Osaka dark)
color0  #002d38
color1  #dc322f
color2  #859900
color3  #b38600
color4  #268bd2
color5  #d33682
color6  #2aa198
color7  #9facae

# Colores brillantes
color8  #002d38
color9  #dc322f
color10 #859900
color11 #b38600
color12 #268bd2
color13 #6c71c4
color14 #2aa198
color15 #9facae

# =============================================================================
# Ventana
# =============================================================================
window_padding_width 0
confirm_os_window_close 0

# Barra de título
wayland_titlebar_color background
hide_window_decorations titlebar-only
